    artifacts: [Entity, Repository, Service, Controller, ReactPage]
    ui_sources: [ClienteView, ClienteWW, ClientePrompt, ClienteGeneral, WizardClienteNova, WizardClienteNovaDados, WizardClienteNovaEndereco, WizardClienteNovaContato, WizardClienteNovaValorHH, WizardClienteNovaValorTipoServico, WizardClienteNovaFinalizacao, DashboardCliente]
