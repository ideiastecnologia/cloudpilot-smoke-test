system: glpportal-subset
target_stack: REACT_DOTNET_CORE
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD

modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        language: CSharp
        target_path: src/Domain/Entities/EmpresaEntity.cs
        fields:
          - name: EmpresaId
            dotnet_type: string
            max_length: 60
            is_primary_key: true
          - name: EmpresaNome
            dotnet_type: string
            max_length: 60
          - name: EmpresaCNPJ
            dotnet_type: string
            max_length: 60
          - name: EmpresaContato
            dotnet_type: string
            max_length: 60
          - name: EmpresaEndereco
            dotnet_type: string
            max_length: 60
          - name: EmpresaAdministradorId
            dotnet_type: string
            max_length: 60
          - name: EmpresaAdministradorNome
            dotnet_type: string
            max_length: 60
          - name: EmpresaEmail
            dotnet_type: string
            max_length: 60
            semantic: email
          - name: EmpresaAtivo
            dotnet_type: bool
            notes: "Campo legado chegou como String; converter para bool no mapeamento ORM"
          - name: EmpresaFoto
            dotnet_type: string
            max_length: 500
            notes: "Armazenar URL ou caminho relativo; binário deve ser externalizado em storage"
          - name: EmpresaTipoRelatorio
            dotnet_type: string
            max_length: 60
            notes: "Avaliar conversão para enum após levantamento de valores possíveis"
          - name: EmpresaDominio
            dotnet_type: string
            max_length: 60
          - name: EmpresaFundoLogin
            dotnet_type: string
            max_length: 500
            notes: "Armazenar URL ou caminho relativo; binário deve ser externalizado em storage"

      - name: IEmpresaRepository
        type: Repository
        language: CSharp
        target_path: src/Domain/Repositories/IEmpresaRepository.cs
        pattern: RepositoryInterface
        methods:
          - GetByIdAsync
          - GetAllAsync
          - AddAsync
          - UpdateAsync
          - DeleteAsync

      - name: EmpresaRepository
        type: Repository
        language: CSharp
        target_path: src/Infrastructure/Persistence/Repositories/EmpresaRepository.cs
        pattern: EFCoreRepository
        db_context: AppDbContext
        notes: "Gerar migrações EF Core a partir da entidade reconstruída (db_strategy=REBUILD)"

      - name: EmpresaService
        type: Service
        language: CSharp
        target_path: src/Application/Services/EmpresaService.cs
        pattern: ApplicationService
        responsibilities:
          - CRUD orquestrado via IEmpresaRepository
          - Validações de negócio (CNPJ, e-mail, ativo)
          - Conversão entre DTO e entidade de domínio
        notes: >
          Regras inline GeneXus (Error/Default) devem ser migradas para
          FluentValidation + validações dentro do Service antes de persistir.

      - name: EmpresaController
        type: Controller
        language: CSharp
        target_path: src/WebApi/Controllers/EmpresaController.cs
        pattern: RESTController
        base_route: api/empresas
        endpoints:
          - method: GET
            route: ""
            action: GetAll
            response_dto: EmpresaListDto
          - method: GET
            route: "{id}"
            action: GetById
            response_dto: EmpresaDetailDto
          - method: POST
            route: ""
            action: Create
            request_dto: EmpresaCreateDto
            response_dto: EmpresaDetailDto
          - method: PUT
            route: "{id}"
            action: Update
            request_dto: EmpresaUpdateDto
            response_dto: EmpresaDetailDto
          - method: DELETE
            route: "{id}"
            action: Delete
            response_dto: NoContent

      - name: EmpresaDtos
        type: DTO
        language: CSharp
        target_path: src/Application/DTOs/Empresa/
        files:
          - EmpresaListDto.cs
          - EmpresaDetailDto.cs
          - EmpresaCreateDto.cs
          - EmpresaUpdateDto.cs
        notes: "Usar AutoMapper ou mapeamento manual para converter entre entidade e DTO"

      - name: AppDbContext
        type: DbContext
        language: CSharp
        target_path: src/Infrastructure/Persistence/AppDbContext.cs
        notes: "Incluir DbSet<EmpresaEntity>; configurar via EmpresaEntityTypeConfiguration (Fluent API)"

      - name: EmpresaPage
        type: ReactComponent
        language: TypeScript
        target_path: frontend/src/pages/Empresa/
        ui_strategy: PRESERVE_WITH_ADJUSTMENTS
        components:
          - name: EmpresaList
            path: frontend/src/pages/Empresa/EmpresaList.tsx
            notes: "Listagem com tabela shadcn/ui; reproduz fluxo original com ajustes visuais"
          - name: EmpresaForm
            path: frontend/src/pages/Empresa/EmpresaForm.tsx
            notes: >
              Formulário de criação e edição; campos mapeados 1:1 com os atributos legados.
              EmpresaAtivo renderizar como Switch/Checkbox.
              EmpresaFoto e EmpresaFundoLogin renderizar como upload de imagem com preview.
          - name: EmpresaDetail
            path: frontend/src/pages/Empresa/EmpresaDetail.tsx
            notes: "View somente leitura; preservar layout original com componentes shadcn"
        api_client: src/services/empresaService.ts
        notes: >
          Origem do AppMasterPage (MasterPage GeneXus) deve ser convertida para
          layout shell React com header/sidebar persistentes; aplicar tema dark-devstudio.

      - name: EmpresaApiService
        type: ApiClient
        language: TypeScript
        target_path: frontend/src/services/empresaService.ts
        notes: "Axios ou fetch wrapper; endpoints alinhados com EmpresaController"

db_rebuild:
  strategy: REBUILD
  orm: EntityFrameworkCore
  dbms_target: SQL Server
  migration_tool: EF Core Migrations
  notes: >
    Nenhum schema legado foi fornecido no inventário (todos os campos chegaram como
    fallback:not-found). O schema será reconstruído inteiramente a partir das entidades
    .NET mapeadas acima. Executar 'dotnet ef migrations add InitialCreate' após
    configurar o DbContext.

ui_shell:
  source_object: AppMasterPage
  strategy: PRESERVE_WITH_ADJUSTMENTS
  target_framework: React
  notes: >
    AppMasterPage não possui tabs definidas no inventário. Converter para um React
    Shell Layout com React Router v6; preservar estrutura de navegação original
    assim que o inventário completo de WebPanels for fornecido.
    Aplicar componentes shadcn/ui e tema dark-devstudio conforme ui_strategy.

warnings:
  - "Todos os campos de Empresa chegaram com resolved_from=fallback:not-found; os tipos foram inferidos como String(60). Revisar tipos reais no sistema GeneXus de origem antes de gerar migrações de banco."
  - "EmpresaAtivo foi recebido como String; verificar se os valores possíveis são 'S'/'N', 'true'/'false' ou numérico para garantir conversão correta para bool no mapeamento EF Core."
  - "EmpresaFoto e EmpresaFundoLogin provavelmente armazenam BLOBs ou caminhos de arquivo no sistema legado; definir estratégia de storage (Azure Blob, S3, disco local) antes de implementar upload."
  - "EmpresaTipoRelatorio sugere um domínio enumerado; levantar todos os valores possíveis no sistema legado e converter para enum C# para evitar magic strings."
  - "EmpresaAdministradorId e EmpresaAdministradorNome indicam relacionamento com entidade Administrador/Usuário não presente no inventário fornecido; mapear FK após inventariar entidade relacionada."
  - "EmpresaCNPJ requer validação específica de formato brasileiro; implementar validator customizado com FluentValidation no EmpresaService."
  - "AppMasterPage não possui tabs no inventário; solicitar inventário completo de WebPanels e menus para reconstruir navegação fiel ao sistema original."
  - "Nenhuma regra de autenticação/autorização foi identificada no inventário; definir estratégia de segurança (JWT, ASP.NET Core Identity) antes de expor os endpoints REST."
  - "O inventário cobre apenas a entidade Empresa; o sistema GeneXus completo pode conter outras entidades interdependentes. Processar o inventário completo para garantir integridade referencial no schema reconstruído."
  - "db_strategy=REBUILD implica que dados existentes em produção NÃO serão migrados automaticamente; planejar estratégia de migração de dados (scripts ETL) separadamente se houver dados a preservar."