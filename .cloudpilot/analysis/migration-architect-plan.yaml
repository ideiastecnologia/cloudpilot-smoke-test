cross_cutting:
  - name: GlobalExceptionHandler
    artifact: ControllerAdvice
    notes: "Mapear erros GeneXus msg()/error() para RFC 7807 ProblemDetails"
  - name: AuditInterceptor
    artifact: EntityListener
    notes: "Campos CreatedBy, UpdatedBy, CreatedAt, UpdatedAt via @EntityListeners"
  - name: PaginationSupport
    artifact: Pageable
    notes: "Paginação manual GeneXus -> Spring Data Pageable"
  - name: I18nSupport
    artifact: MessageSource
    notes: "Textos do sistema atualmente em PT-BR; preparar i18next no frontend e messages.properties no backend"
  - name: SessionManagement
    artifact: JwtStateless
    notes: "Substituir sessão stateful GeneXus por JWT stateless com refresh token"
  - name: TransactionManagement
    artifact: Transactional
    notes: "commit()/rollback() explícito GeneXus -> @Transactional com propagação adequada por operação"
  - name: FileStorage
    artifact: StorageService
    notes: "Uploads de foto, PDF e blob GeneXus -> serviço de armazenamento (local/S3); definir estratégia de migração de blobs existentes"
  - name: EmailService
    artifact: SmtpService
    notes: "Módulo ParametroEmail configura SMTP por empresa; implementar serviço multi-tenant de e-mail"
  - name: WebSocketChat
    artifact: WebSocketConfig
    notes: "GXChatMessage/GXChatUser -> WebSocket com STOMP para PanelChatWeb e ChatBotMasterWeb"
  - name: ReportEngine
    artifact: ReportService
    notes: "WPRelatorioOrdem, WPRelatorioTimeSheet, WPRelatorioPonto, WPImprimirAtendimento, WPImprimirMedicao -> biblioteca de geração de PDF (ex: iText ou JasperReports em .NET: FastReport/SSRS)"
  - name: GeolocationService
    artifact: GeoService
    notes: "PromptGeolocation, MapWebComponent, campos Latitude/Longitude -> integração com API de mapas (Google Maps ou equivalente)"
  - name: SchedulerService
    artifact: ScheduledTasks
    notes: "Processos batch de notificação, renovação de documentos, alertas de vencimento -> @Scheduled tasks"

db:
  strategy: REBUILD
  target_dbms: SQL_SERVER
  notes: "Todas as entidades GeneXus serão recriadas como tabelas normalizadas no banco SQL Server. Campos com tipo fallback:not-found devem ter tipos inferidos pela equipe de migração conforme análise semântica dos nomes."
  migration_steps:
    - Criar schema a partir das entidades mapeadas neste plano
    - Gerar scripts de migração de dados do banco GeneXus legado
    - Validar integridade referencial entre entidades relacionadas
    - Migrar blobs/imagens para armazenamento externo ou coluna VARBINARY conforme política definida
    - Tabelas Protheus (SA1010, SA2010, SA3010, SB1010, SE1010, SE4010, SF4010, SED010, CT1010, CTT010, CC2010, DA0010, DA1010, SC7010, SD2010, SAH010, SBE010, NNR010, SYA010, SE5010) devem permanecer no banco Protheus e ser acessadas via adapter de integração, NAO replicadas

ui:
  strategy: PRESERVE_WITH_ADJUSTMENTS
  frontend_stack: React
  ui_framework: shadcn/ui
  theme: dark-devstudio
  component_mapping:
    WorkWith_pattern: DataTable + filtros shadcn/ui
    View_pattern: DetailCard com campos readonly
    General_pattern: Form com react-hook-form + zod validation
    Prompt_pattern: Dialog/Modal com busca e seleção
    WC_pattern: React reusable component
    WP_pattern: React page com fluxo wizard ou ação pontual
    Dashboard_pattern: Cards + Charts (recharts ou tremor)
    Wizard_pattern: Stepper component shadcn/ui
  notes: "Preservar fluxos e estrutura de dados das telas GeneXus. Substituir controles visuais GeneXus por equivalentes shadcn/ui mantendo familiaridade operacional. Telas GAM serão substituídas por módulo de Auth próprio."

warnings:
  - "TIPO_DADOS: Todos os campos do inventário estão com java_type=String e length=60 por fallback. A equipe de migração DEVE revisar cada campo e atribuir tipos corretos (int, decimal, boolean, datetime, blob) com base na análise semântica dos nomes antes de iniciar o desenvolvimento."
  - "ENTIDADES_BC: UsuarioBC, EmpresaBC, GestaoServicoBC, ClienteBC, ClienteLogisticaBC são versões Business Component das mesmas entidades principais. Consolidar em uma única entidade por módulo com as operações CRUD unificadas."
  - "TABELAS_PROTHEUS: SA1010, SA2010, SA3010, SA4010, SB1010, SE1010, SE4010, SE5010, SF4010, SED010, CT1010, CTT010, CC2010, DA0010, DA1010, SC7010, SD2010, SAH010, SBE010, NNR010, SYA010 são tabelas do ERP Protheus lidas pelo sistema legado. Definir se integração será via REST API do Protheus, acesso direto ao banco Protheus, ou replicação de dados. NÃO recriar essas tabelas no novo banco."
  - "AUTENTICACAO_GAM: O sistema usa GeneXus GAM para autenticação. Todos os objetos GAM* da UI precisam ser substituídos por módulo Auth próprio com JWT. Mapear permissões GAM para roles no novo sistema antes da migração."
  - "MULTITENANCY: O sistema é multi-empresa — praticamente todas as entidades têm campo EmpresaId. Implementar isolamento de dados por empresa no novo sistema (tenant filter global via EF Core query filter ou middleware)."
  - "MERCADOPAGO: Integração com MercadoPago (Subscription, Plan, PurchaseOrder, Payment) requer configuração de webhooks e credenciais por empresa. Implementar como módulo isolado com configuração multi-tenant."
  - "CHAT_WEBSOCKET: GXChatMessage e GXChatUser implementam chat interno. Avaliar se manter implementação própria ou substituir por solução de mercado (SignalR no .NET Core)."
  - "SIVA_INTEGRACAO: RetornoRotaSIVA e os fluxos de envio/retorno SIVA não têm documentação de contrato de API disponível no inventário. Equipe deve levantar especificação da API SIVA antes de implementar o adapter."
  - "RELATORIOS: Múltiplos WebPanels de relatório (WPRelatorioOrdem, WPRelatorioTimeSheet, WPRelatorioPonto, etc.) usam layout de impressão GeneXus. Definir biblioteca de PDF para .NET Core (FastReport, SSRS, ou Telerik) e recriar layouts."
  - "BLOBS_ARQUIVOS: Campos de foto, PDF e arquivo (EmpresaFoto, GestaoServicoAnexoFoto, ContratoAnexoBlobFile, etc.) armazenados como blob no GeneXus. Definir estratégia de migração: manter no banco como VARBINARY ou migrar para armazenamento externo (Azure Blob, S3, MinIO)."
  - "GEOLOCALICAO: ClienteLogisticaLatitude, ClienteLogisticaLongitude, ClienteEnderecoGeo e MapWebComponent requerem integração com API de mapas. Definir provedor (Google Maps, OpenStreetMap/Leaflet) e chave de API antes do desenvolvimento."
  - "DASHBOARD_AGREGACAO: Os módulos de Dashboard (DashboardServico, DashboardTecnicos, etc.) não possuem entidade própria no legado; são compostos por WebPanels com múltiplas queries. Implementar como endpoints de agregação com queries otimizadas ou views materializadas."
  - "PONTO_ELETRONICO: Módulo de ponto eletrônico (PontoEletronico, marcações) pode ter requisitos legais de imutabilidade de registros. Avaliar necessidade de audit log imutável para esta entidade."
  - "OSCHECKLIST_ROTEIRO: GestaoServicoLista e GestaoServicoRoteiro representam checklists e roteiros de execução. Verificar regras de negócio de preenchimento obrigatório antes da execução/finalização das OSs."
  - "MIGRACAO_DADOS: O volume de entidades é alto (90+ entidades principais). Recomendar migração por módulo com estratégia blue-green ou feature flags para minimizar risco operacional."
  - "INTEGRACAO_MANUAL: WPIntegracaoClienteManual e WPImportacao sugerem processos de importação manual de dados. Mapear formatos de arquivo esperados e recriar funcionalidade de upload/processamento em batch."
  - "CONTROLE_ACESSO_PERFIL: O sistema possui módulo próprio de controle de acesso (Modulo, Perfil, ModuloRotina, PerfilModuloRotina, PMRFuncao) além do GAM. Definir se manter controle de acesso próprio ou unificar com o módulo Auth JWT baseado em claims/roles."