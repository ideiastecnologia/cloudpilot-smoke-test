system: glpportal-subset
target_stack: REACT_DOTNET_CORE
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD

modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        language: csharp
        target_path: src/Domain/Entities/EmpresaEntity.cs
        fields:
          - name: EmpresaId
            clr_type: string
            max_length: 60
            is_primary_key: true
          - name: EmpresaNome
            clr_type: string
            max_length: 60
          - name: EmpresaCNPJ
            clr_type: string
            max_length: 60
          - name: EmpresaContato
            clr_type: string
            max_length: 60
          - name: EmpresaEndereco
            clr_type: string
            max_length: 60
          - name: EmpresaAdministradorId
            clr_type: string
            max_length: 60
          - name: EmpresaAdministradorNome
            clr_type: string
            max_length: 60
          - name: EmpresaEmail
            clr_type: string
            max_length: 60
            notes: considerar anotação [EmailAddress] para validação
          - name: EmpresaAtivo
            clr_type: bool
            notes: campo legado declarado como String(60); converter para bool na camada de mapeamento
          - name: EmpresaFoto
            clr_type: string
            max_length: 60
            notes: pode representar URL ou blob; confirmar estratégia de armazenamento de mídia
          - name: EmpresaTipoRelatorio
            clr_type: string
            max_length: 60
            notes: candidato a enum; depende de levantamento de valores no legado
          - name: EmpresaDominio
            clr_type: string
            max_length: 60
          - name: EmpresaFundoLogin
            clr_type: string
            max_length: 60
            notes: pode representar URL de imagem ou blob; confirmar com equipe de UX

      - name: IEmpresaRepository
        type: Repository
        language: csharp
        target_path: src/Domain/Interfaces/IEmpresaRepository.cs
        pattern: repository_interface
        methods:
          - GetByIdAsync(string empresaId)
          - GetAllAsync()
          - AddAsync(EmpresaEntity empresa)
          - UpdateAsync(EmpresaEntity empresa)
          - DeleteAsync(string empresaId)
          - ExistsAsync(string empresaId)

      - name: EmpresaRepository
        type: Repository
        language: csharp
        target_path: src/Infrastructure/Persistence/Repositories/EmpresaRepository.cs
        pattern: ef_core_repository
        db_context: AppDbContext
        notes: DbStrategy REBUILD; esquema gerado via EF Core Migrations; sem reaproveitamento de schema legado

      - name: EmpresaService
        type: Service
        language: csharp
        target_path: src/Application/Services/EmpresaService.cs
        pattern: application_service
        dependencies:
          - IEmpresaRepository
        methods:
          - GetEmpresaByIdAsync(string empresaId)
          - ListEmpresasAsync()
          - CreateEmpresaAsync(EmpresaCreateDto dto)
          - UpdateEmpresaAsync(string empresaId, EmpresaUpdateDto dto)
          - DeleteEmpresaAsync(string empresaId)
        validation: FluentValidation
        error_handling: RFC7807_ProblemDetails

      - name: EmpresaController
        type: Controller
        language: csharp
        target_path: src/API/Controllers/EmpresaController.cs
        pattern: rest_controller
        base_route: api/v1/empresas
        endpoints:
          - method: GET
            route: ""
            action: ListEmpresasAsync
            response: 200_EmpresaListDto
          - method: GET
            route: "{empresaId}"
            action: GetEmpresaByIdAsync
            response: 200_EmpresaDto | 404
          - method: POST
            route: ""
            action: CreateEmpresaAsync
            request: EmpresaCreateDto
            response: 201_EmpresaDto | 400 | 422
          - method: PUT
            route: "{empresaId}"
            action: UpdateEmpresaAsync
            request: EmpresaUpdateDto
            response: 200_EmpresaDto | 400 | 404 | 422
          - method: DELETE
            route: "{empresaId}"
            action: DeleteEmpresaAsync
            response: 204 | 404
        security: JWT_Bearer

      - name: EmpresaDto
        type: DTO
        language: csharp
        target_path: src/Application/DTOs/EmpresaDto.cs
        variants:
          - EmpresaDto
          - EmpresaCreateDto
          - EmpresaUpdateDto
          - EmpresaListDto

      - name: EmpresaProfile
        type: Mapper
        language: csharp
        target_path: src/Application/Mappings/EmpresaProfile.cs
        pattern: AutoMapper_Profile
        mappings:
          - EmpresaEntity <-> EmpresaDto
          - EmpresaCreateDto -> EmpresaEntity
          - EmpresaUpdateDto -> EmpresaEntity

      - name: AppDbContext_EmpresaConfig
        type: EFCoreConfiguration
        language: csharp
        target_path: src/Infrastructure/Persistence/Configurations/EmpresaConfiguration.cs
        pattern: IEntityTypeConfiguration
        notes: definir tabela alvo, chave primária, comprimentos máximos e índices

  - name: Frontend
    source_entity: AppMasterPage
    target_package: frontend.empresa
    artifacts:
      - name: EmpresaListPage
        type: ReactPage
        target_path: frontend/src/pages/empresa/EmpresaListPage.tsx
        strategy: PRESERVE_WITH_ADJUSTMENTS
        notes: >
          Reproduz fluxo de listagem do MasterPage legado com componentes shadcn/ui;
          usar DataTable com paginação client-side ou server-side conforme volume de dados;
          manter familiaridade de layout para usuários existentes

      - name: EmpresaFormPage
        type: ReactPage
        target_path: frontend/src/pages/empresa/EmpresaFormPage.tsx
        strategy: PRESERVE_WITH_ADJUSTMENTS
        notes: >
          Formulário de criação e edição unificado via param mode (create/edit);
          exibir campo EmpresaFoto como upload com preview;
          EmpresaAtivo renderizado como toggle/checkbox

      - name: EmpresaDetailPage
        type: ReactPage
        target_path: frontend/src/pages/empresa/EmpresaDetailPage.tsx
        strategy: PRESERVE_WITH_ADJUSTMENTS

      - name: empresaApi
        type: ReactService
        target_path: frontend/src/services/empresaApi.ts
        pattern: RTK_Query_or_Axios_service
        notes: consumir endpoints REST do EmpresaController

      - name: useEmpresa
        type: ReactHook
        target_path: frontend/src/hooks/useEmpresa.ts
        notes: encapsular lógica de estado e chamadas à API para as páginas de Empresa

db:
  strategy: REBUILD
  orm: EF_Core
  migration_tool: EF_Core_Migrations
  target_dbms: SQL_Server
  schema_source: code_first
  notes: >
    Nenhum schema legado é reaproveitado; o esquema completo será gerado a partir
    das entidades .NET via Add-Migration / Update-Database.
    Avaliar estratégia de seeding para dados de referência existentes no legado.

auth:
  strategy: JWT_Stateless
  notes: >
    GeneXus Users/Roles legado deve ser mapeado para ASP.NET Core Identity ou
    solução equivalente; confirmar provider de autenticação (Identity Server, Azure AD, etc.)
    antes de implementar EmpresaController security policy.

warnings:
  - "EmpresaId declarado como String(60) no inventário legado com resolved_from fallback:not-found; confirmar se é GUID, código alfanumérico ou sequencial antes de definir tipo definitivo e estratégia de geração de chave."
  - "EmpresaAtivo está tipado como String(60) no inventário; converter para bool no mapeamento e validar todos os valores presentes no banco legado antes da migração."
  - "EmpresaFoto e EmpresaFundoLogin podem representar BLOBs binários ou URLs; definir estratégia de storage (Azure Blob, S3, sistema de arquivos local) antes de implementar upload/download."
  - "EmpresaTipoRelatorio é candidato a domínio enumerado; levantar conjunto de valores válidos no legado para criar enum C# correspondente e evitar magic strings."
  - "EmpresaCNPJ requer validação de formato específica (Brasil); adicionar validator customizado com FluentValidation e considerar máscara no frontend."
  - "EmpresaAdministradorId sugere FK para uma entidade Administrador/Usuário que não consta no inventário fornecido; verificar dependência antes de implementar EmpresaRepository e definir se a FK será enforced no banco."
  - "AppMasterPage não possui tabs mapeadas no UI Inventory; o layout master (menu, header, footer) deve ser reconstruído como React Layout Component com shadcn/ui; coletar screenshots ou especificação visual do legado para orientar o agente de UI."
  - "Nenhuma regra de negócio (Rules), evento (Events) ou validação inline do GeneXus foi fornecida para a entidade Empresa; o agente de implementação deve auditar o KB legado para extrair e portar essas regras para FluentValidation e camada de Service antes de finalizar EmpresaService."
  - "db_strategy REBUILD implica ausência de migração incremental de schema; planejar estratégia de ETL ou script de carga inicial para dados de produção existentes."
  - "Sem mapeamento de autenticação/autorização no inventário fornecido; definir política de segurança para EmpresaController (roles, claims) alinhada com o modelo de segurança do sistema completo."