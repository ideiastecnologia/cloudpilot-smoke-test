system: glpportal-full
target_stack: REACT_DOTNET_CORE
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD

modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts: [Entity, Repository, Service, Controller, ReactPage]
    ui_sources: [EmpresaView, EmpresaWW, EmpresaPrompt, EmpresaGeneral]
    notes: Inclui campos de foto (blob/arquivo), domínio, fundo de login e tipo de relatório — mapear para BlobStorage/S3.

  - name: EmpresaBC
    source_entity: EmpresaBC
    target_package: com.glpportal.empresa
    artifacts: [Entity, Repository, Service]
    notes: Subconjunto de Empresa usado como Business Component — consolidar com módulo Empresa; evitar duplicação de entidade.

