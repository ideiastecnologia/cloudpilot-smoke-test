system: glpportal-subset
target_stack: REACT_DOTNET_CORE
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD
modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        language: CSharp
        path: src/Domain/Empresa/EmpresaEntity.cs
        notes: >
          Mapear campos da Transaction GeneXus para propriedades C#.
          EmpresaId como chave primária (string, verificar se deve migrar para Guid).
          EmpresaEmail recomenda uso de tipo semântico (Email domain) — validar com atributo [EmailAddress].
          EmpresaFoto mapeado como string URI ou blob conforme decisão de storage.
          EmpresaAtivo mapeado como bool.
          EmpresaTipoRelatorio mapeado como string ou enum após levantamento de valores possíveis.
          EmpresaAdministradorId/EmpresaAdministradorNome indicam FK para entidade Administrador/Usuário — confirmar existência no inventário completo.
      - name: IEmpresaRepository
        type: Repository
        language: CSharp
        path: src/Domain/Empresa/IEmpresaRepository.cs
        notes: >
          Interface de repositório com operações CRUD básicas.
          Estratégia REBUILD implica recriação do schema — usar EF Core Code-First com migrations.
      - name: EmpresaRepository
        type: Repository
        language: CSharp
        path: src/Infrastructure/Empresa/EmpresaRepository.cs
        notes: >
          Implementação concreta com Entity Framework Core.
          Configurar DbContext e DbSet<EmpresaEntity>.
          Índice único recomendado sobre EmpresaCNPJ e EmpresaDominio.
      - name: EmpresaService
        type: Service
        language: CSharp
        path: src/Application/Empresa/EmpresaService.cs
        notes: >
          Encapsular regras de negócio equivalentes às Rules da Transaction GeneXus.
          Validar CNPJ (formato), unicidade de EmpresaDominio e EmpresaCNPJ.
          EmpresaAtivo como flag de soft-delete recomendado.
          Mapear lógica de Error/Msg GeneXus para exceções de domínio ou FluentValidation.
      - name: EmpresaController
        type: Controller
        language: CSharp
        path: src/API/Controllers/EmpresaController.cs
        notes: >
          REST Controller com endpoints GET, POST, PUT, DELETE para /api/empresa.
          Expor EmpresaId como chave de rota.
          Retornar DTOs (EmpresaDto) — nunca expor a entidade diretamente.
          Usar [Authorize] conforme política de segurança do sistema.
      - name: EmpresaDto
        type: DTO
        language: CSharp
        path: src/Application/Empresa/EmpresaDto.cs
        notes: >
          DTO de transferência para leitura e escrita.
          Separar CreateEmpresaDto e UpdateEmpresaDto se campos editáveis diferirem do payload de criação.
      - name: EmpresaReactPage
        type: UIComponent
        language: TypeScript
        framework: React
        path: frontend/src/pages/Empresa/EmpresaPage.tsx
        ui_strategy_applied: PRESERVE_WITH_ADJUSTMENTS
        notes: >
          Reproduzir fluxo funcional do WebPanel/Transaction GeneXus com ajustes visuais.
          Usar componentes shadcn/ui para formulários, tabelas e feedback.
          Campos: EmpresaNome, EmpresaCNPJ, EmpresaContato, EmpresaEndereco, EmpresaEmail, EmpresaAtivo (toggle), EmpresaFoto (upload), EmpresaTipoRelatorio (select), EmpresaDominio.
          EmpresaFundoLogin: campo de upload de imagem para personalização da tela de login.
          EmpresaAdministradorId/Nome: exibir como campo de seleção vinculado à entidade Administrador.
      - name: EmpresaDbContext
        type: DbContext
        language: CSharp
        path: src/Infrastructure/Data/AppDbContext.cs
        notes: >
          Registrar DbSet<EmpresaEntity>.
          Configurar mapeamento via Fluent API: tamanhos de coluna, índices únicos, constraints.
          Estratégia REBUILD: gerar migration inicial do zero — sem reverse engineering do schema GeneXus.

db_migration:
  strategy: REBUILD
  orm: EntityFrameworkCore
  database_hint: SQL Server ou PostgreSQL (definir conforme ambiente alvo)
  notes: >
    Schema será criado via Code-First migrations.
    Revisar tipos de dado: todos os campos no inventário estão mapeados como String/length:60 — validar tipos reais (ex: EmpresaAtivo deve ser bool, EmpresaFoto pode ser blob/URI, EmpresaAdministradorId pode ser Guid ou int).
    Criar índice único em EmpresaCNPJ e EmpresaDominio.
    Avaliar soft-delete via campo EmpresaAtivo ao invés de DELETE físico.

ui_notes:
  master_page: AppMasterPage
  tabs_detected: []
  notes: >
    Inventário de UI contém AppMasterPage sem tabs definidas.
    Estratégia PRESERVE_WITH_ADJUSTMENTS: recriar o layout master com header/footer/nav equivalentes usando React + shadcn/ui.
    Sem tabs no MasterPage — estrutura de navegação lateral ou top-nav a definir com o time de UX.

warnings:
  - "EmpresaId está mapeado como String (length 60) no inventário — verificar se é um identificador alfanumérico legado ou deve ser migrado para Guid/int no sistema alvo."
  - "EmpresaAdministradorId e EmpresaAdministradorNome sugerem FK para uma entidade Administrador ou Usuário não presente no inventário fornecido — confirmar existência e incluir módulo correspondente no plan."
  - "Todos os campos no Semantic Inventory estão com resolved_from: fallback:not-found — os tipos GeneXus originais não foram resolvidos. Revisar tipos reais antes de gerar as migrations."
  - "EmpresaFoto e EmpresaFundoLogin são campos de imagem — definir estratégia de storage (blob no banco, sistema de arquivos, ou object storage como S3/Azure Blob) antes de implementar."
  - "EmpresaTipoRelatorio requer levantamento dos valores possíveis no sistema legado para decidir entre string livre ou enum tipado no sistema alvo."
  - "EmpresaEmail deve ter validação de formato aplicada tanto no frontend (React Hook Form + zod) quanto no backend (FluentValidation ou DataAnnotations)."
  - "AppMasterPage não possui tabs definidas no UI Inventory — o layout de navegação global precisa ser mapeado manualmente com o time de produto antes da implementação do frontend."
  - "Estratégia REBUILD de banco implica perda do schema legado — garantir backup e plano de migração de dados existentes antes de executar migrations em ambiente com dados produtivos."
  - "Campos length:60 uniformes no inventário são provavelmente padrão de fallback do parser GeneXus — ajustar tamanhos reais de coluna conforme regras de negócio antes de gerar o DbContext."