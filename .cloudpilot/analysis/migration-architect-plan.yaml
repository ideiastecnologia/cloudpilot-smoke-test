cross_cutting:
  auth:
    strategy: JWT_BEARER
    notes: >
      GeneXus GAM integrated security must be replaced with ASP.NET Core Identity +
      JWT Bearer tokens. AccessToken entity maps to refresh token table.
      Roles/permissions from Perfil/Modulo/Rotina/PMRFuncao hierarchy must be
      translated to ASP.NET Core Claims-based authorization policies.
  validation:
    strategy: FLUENT_VALIDATION
    notes: >
      GeneXus inline rules (Error, Default, NoAccept) must be translated to
      FluentValidation validators in the Service layer and DataAnnotations on DTOs.
  error_handling:
    strategy: PROBLEM_DETAILS_RFC7807
    notes: >
      GeneXus msg() and Error() rules map to ProblemDetails middleware in ASP.NET Core.
      Global exception handler required for unhandled exceptions.
  logging:
    strategy: SERILOG
    notes: >
      Replace GeneXus LogRecord entity-based logging with Serilog structured logging.
      Retain LogRecord entity for business audit trail only.
  email:
    strategy: SMTP_SERVICE
    notes: >
      ParametroEmail entity drives SMTP configuration; implement IEmailService
      abstraction backed by SmtpClient or SendGrid depending on environment.
  real_time:
    strategy: SIGNALR
    notes: >
      GXChatMessage and GXChatUser entities indicate real-time chat; implement
      SignalR hub for PanelChatWeb and ChatBotMasterWeb replacements.
  mercadopago:
    strategy: MERCADOPAGO_SDK_DOTNET
    notes: >
      MercadoPagoServices drives payment gateway integration; use official
      MercadoPago .NET SDK. Sandbox/production environment controlled by
      MercadoPagoServicesAmbiente field.
  maps:
    strategy: GOOGLE_MAPS_REACT
    notes: >
      MapWebComponent requires Google Maps React integration.
      ClienteLogisticaLatitude/Longitude fields drive map pins.
  protheus_integration:
    strategy: REST_OR_DIRECT_DB_READ_ONLY
    notes: >
      All SAxxxx/SDxxxx/SFxxxx/CTxxxx/DAxxxx Protheus tables are read-only
      integration sources. Implement dedicated integration adapters/repositories
      with explicit connection strings separate from the main application database.
      Do not include Protheus tables in EF Core migrations for the application DB.
  file_storage:
    strategy: BLOB_STORAGE
    notes: >
      Multiple entities store file references (BlobFile, Foto, Arquivo, Anexo fields).
      Implement IFileStorageService abstraction; recommend Azure Blob Storage or
      AWS S3 for production. GeneXus blob fields must be migrated or externalized.

db_rebuild_notes:
  - All entity IDs appear as String(60) in the semantic inventory due to GeneXus fallback resolution; conduct data profiling to determine actual key types (numeric autonumber vs UUID vs string) before schema generation
  - GeneXus sub_entities (levels) map to separate tables with composite FK to parent PK; preserve this in REBUILD schema
  - BC (Business Component) variants of entities (EmpresaBC, UsuarioBC, GestaoServicoBC, ClienteBC, ClienteLogisticaBC) are design-time artifacts and should NOT generate separate tables; merge fields into canonical entity table
  - Temp entities (ModuloRotinaTemp, PMRFuncaoTemp, OSAnexoTemp) require evaluation; prefer in-memory or Redis cache over persistent tables
  - Protheus integration tables (SA1010, SB1010, SE1010, SF4010, etc.) must use a dedicated read-only database context pointing to the Protheus SQL Server instance; do NOT migrate data into the new application database
  - ClienteResponsavel sub_entity in Cliente conflicts with standalone ClienteContato and ContratoResponsavel entities; normalize during REBUILD to avoid duplication
  - GestaoServicoExecutante and OrdemExecutante have overlapping concerns; consolidate into single execution tracking entity after domain analysis

warnings:
  - CRITICAL: All fields in the semantic inventory resolved as String(60) due to fallback resolution; a complete data profiling pass on the production GeneXus database is mandatory before generating EF Core entity classes and migrations
  - CRITICAL: Protheus integration tables (SA1010, SB1010, SE1010, SF4010, CT1010, CTT010, SED010, SF4010, DA0010, DA1010, SBE010, SAH010, SYA010, CC2010, NNR010, SC7010, SD2010) contain hundreds of cryptic ERP columns; implement selective projection DTOs and never map all columns into domain entities
