  - name: ProtheusTables
    source_entity: SA1010
    target_package: com.glpportal.integracao.protheus
    artifacts: [ReadOnlyEntity, Repository, Service]
    notes: >
      Tabelas Protheus lidas como externas: SA1010 (Clientes), SA2010 (Fornecedores),
      SA3010 (Vendedores), SA4010 (Transportadoras), SB1010 (Produtos), SE4010 (CondicoesPagamento),
      SE1010 (TitulosReceber), SE5010 (Baixas), SED010 (NaturezasFinanceiras),
      SF4010 (TES), CTT010 (CentroCusto), CT1010 (PlanoContas), DA0010 (TabelaPreco),
      DA1010 (ItensTabPreco), NNR010 (Armazens), SBE010 (Localizacoes), SAH010 (UnidadesMedida),
      CC2010 (Municipios), SYA010 (Paises), CTT010 (CentroCusto), SD2010 (NFs saída), SC7010 (SC7).
      Todas têm campos R_E_C_N_O_ e D_E_L_E_T_ típicos do Protheus; mapear como readonly views
      ou via camada de integração REST com TOTVS Protheus. NÃO recriar no banco novo.

  - name: Auth
    source_entity: Login
    target_package: com.glpportal.auth
    artifacts: [JwtService, AuthController, ReactLoginPage, ReactAuthGuard]
    ui_forms:
      - Login
      - WPEsqueciSenha
      - WPNovaConta
      - WPNovaEmpresa
      - WPPrimeiroAcesso
      - WPEsqueciSenhaCliente
      - WPConfirmacaoIngressoEmpresa
    notes: Substituir autenticação GAM GeneXus por ASP.NET Core Identity + JWT stateless com refresh token; manter suporte a multi-empresa.

warnings:
  - "ENTIDADES DUPLICADAS: Empresa/EmpresaBC, Usuario/UsuarioBC, Cliente/ClienteBC, GestaoServico/GestaoServicoBC, ClienteLogistica/ClienteLogisticaBC existem como pares Transaction+BC; consolidar em uma única entidade .NET Core com repositório e service únicos."
  - "CAMPOS GENÉRICOS: Todos os campos do inventário foram tipados como String(60) no fallback; a equipe deve revisar e atribuir tipos corretos (decimal, datetime, boolean, int, etc.) antes de gerar migrações de banco."
  - "TABELAS PROTHEUS (SA1010, SB1010, SE1010, etc.): São tabelas legadas de ERP externo; NÃO devem ser recriadas no banco novo. Implementar como integrações via API REST Protheus ou views somente-leitura com conexão separada."
  - "CAMPOS DE SENHA EM TEXTO PLANO: ParametroEmail.ParametroEmailSenha, Usuario.UsuarioSenha, Cliente.ClienteSenha, MercadoPagoInfo.MercadoPagoAccessToken devem ser armazenados com criptografia (BCrypt / Azure Key Vault); nunca em texto plano."
  - "CAMPOS GEOGRÁFICOS: ClienteLogistica.Latitude/Longitude, ClienteLogistica.EnderecoGeo devem ser mapeados para tipos geoespaciais (NetTopologySuite + SQL Server Geography ou PostGIS); não como strings."
  - "CAMPOS DINÂMICOS EAV: Equipamento.Campo e ClienteEquipamento.Campo possuem tipo/tamanho variável por instância; avaliar coluna JSON (NVARCHAR(MAX) + JsonDocument) ou padrão EAV com tabela de metadados."
  - "INTEGRAÇÃO SIVA: RetornoRotaSIVA usa nomenclatura snake_case e estrutura de retorno de API externa; implementar adapter/anti-corruption layer para isolar do domínio interno."
  - "INTEGRAÇÃO MERCADOPAGO: Subscription, PurchaseOrder, Plan dependem de webhooks e credenciais por ambiente; implementar com padrão Outbox e idempotência para evitar duplicação de cobranças."
  - "AUTENTICAÇÃO GAM: Sistema legado usa GeneXus GAM para autenticação. Migrar para ASP.NET Core Identity + JWT. Os WebPanels de GAM (GAMHome, GAMWWUsers, etc.) devem ser reimplementados como React + Identity Server ou equivalente."
  - "CAMPO GUID: Usuario.UsuarioGUID deve ser substituído por Guid nativo do .NET; avaliar se é usado como token de reset de senha ou identificador externo."
  - "CAMPOS DE FOTO/IMAGEM: EmpresaFoto, UsuarioFoto, GestaoAtivoFoto, ProspectAnexoPDF, OrdemExecutanteAnexoFoto armazenam caminhos ou blobs; definir estratégia de storage (Azure Blob Storage / AWS S3) antes da implementação."
  - "MÓDULOS ORCAMENTO com 12 campos mensais (Jan..Dez): Normalizar em tabela OrcamentoMensalValor com colunas (OrcamentoId, Mes, Valor) ao invés de 12 colunas fixas."
  - "CAMPO WHATSAPP: Usuario.UsuarioPontoWpp sugere integração com WhatsApp Business API; documentar e implementar como serviço externo separado."
  - "FORMULA/CAMPOS CALCULADOS GeneXus: Campos como GestaoServico.GestaoServicoTempoAberto, GestaoServico.GestaoServicoDiasAberto, Cliente.ClienteEnderecoCompleto são fórmulas GeneXus; reimplementar como propriedades calculadas no domínio ou views de banco."
  - "TABELA ModuloRotinaTemp e PMRFuncaoTemp: São tabelas temporárias de processamento GeneXus; avaliar se devem persistir ou ser substituídas por lógica em memória no service .NET."
  - "CHAT EM TEMPO REAL: GXChatMessage e GXChatUser usam infraestrutura de notificação GeneXus; substituir por SignalR Hub no ASP.NET Core com persistência no banco."
  - "MULTI-EMPRESA: O sistema tem campo EmpresaId em praticamente todas as entidades indicando isolamento multi-tenant por empresa; implementar Row-Level Security ou filtros de tenant no DbContext do Entity Framework Core."
  - "FORMULÁRIOS SEM TABS MAPEADAS: Todos os 300+ formulários UI têm tabs vazias no inventário; a equipe de front-end deve inspecionar manualmente os WebPanels GeneXus exportados para mapear campos, grids e eventos antes de implementar os componentes React."
  - "DASHBOARDS: DashboardServico, DashboardTecnicos, DashboardContratos, DashboardRota, DashboardCompras, DashboardProgramacaoRota, DashboardComissionamento, DashboardCliente requerem definição de KPIs e queries antes da implementação; não há inventário de métricas no sistema fonte."
  - "WIZARD STEPS: Múltiplos wizards (WPWizardNovaOS, WizardClienteNova, WizardProspect, WizardGestaoAtivo) devem ser implementados como componentes React com estado gerenciado (Zustand/Redux) e validação por step."
  - "SCHEDULER/AGENDA: WPAgendaTecnica e SchedulerDetailsForm sugerem componente de calendário/agenda; avaliar biblioteca React (FullCalendar, React Big Calendar) compatível com shadcn."
  - "MAPA: MapWebComponent sugere integração com Google Maps / Leaflet para visualização geoespacial de rotas e clientes."
  - "IMPORTAÇÃO DE DADOS: WWP_SelectImportFile e WPImportacao indicam funcionalidade de importação em lote; implementar com background jobs (Hangfire / .NET Hosted Services) para arquivos grandes."
  - "ACESSO CLIENTE: WorkWithPlusMasterPageAcessoCliente, FinanceiroAcessoCliente e AcessoCliente sugerem portal externo para clientes finais com autenticação separada do portal interno; considerar aplicação React separada ou roteamento por subdomínio."
  - "RELATÓRIOS: WPRelatorioOrdem, WPRelatorioTimeSheet, WPRelatorioPonto, WPImprimirAtendimento, WPImprimirMedicao, WPRelatorioSituacao, WPExportarHistoricoRota sugerem geração de PDF; implementar com QuestPDF ou FastReport para .NET Core."
  - "INTEGRAÇÃO TOTVS PROTHEUS via tabelas SA1010..SE5010: Avaliar se acesso será direto ao banco Protheus (readonly connection string) ou via TOTVS Fluig / REST API Protheus; esta decisão impacta a arquitetura do módulo ProtheusTables."