      - name: ClienteContrato
        source_entity: ClienteContrato
        artifacts: [Entity, Repository, Service]
        ui_sources: [WCClienteContrato, ClienteContratoPrompt]
    notes: >
      Entidade central do sistema com alto número de campos — considerar divisão vertical em tabelas separadas para dados fiscais, endereço, logística e contrato.
      Campos CNPJ, InscricaoEstadual, CI requerem validação de formato no backend.
      Campo ClienteExibicao sugere lógica de formatação de nome para exibição — mapear para computed property.

