system: glpportal-subset
target_stack: REACT_DOTNET_CORE
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD

modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        language: CSharp
        notes: >
          Mapear EmpresaId como chave primária (tipo a confirmar — fallback detectado).
          EmpresaAtivo deve ser mapeado para bool.
          EmpresaFoto e EmpresaFundoLogin devem ser mapeados para string de URL ou caminho de blob storage.
          EmpresaEmail deve usar Data Annotation [EmailAddress].
          EmpresaCNPJ deve usar Data Annotation com validação customizada de CNPJ.
          EmpresaAdministradorId / EmpresaAdministradorNome sugerem FK para entidade de Usuário/Administrador — confirmar existência no inventário completo.
          EmpresaTipoRelatorio sugere enum — domínio a ser definido pelo time.
          EmpresaDominio pode exigir validação de formato de domínio.
        fields:
          - field: EmpresaId
            dotnet_type: string
            max_length: 60
            is_pk: true
          - field: EmpresaNome
            dotnet_type: string
            max_length: 60
          - field: EmpresaCNPJ
            dotnet_type: string
            max_length: 60
            validation: custom_cnpj
          - field: EmpresaContato
            dotnet_type: string
            max_length: 60
          - field: EmpresaEndereco
            dotnet_type: string
            max_length: 60
          - field: EmpresaAdministradorId
            dotnet_type: string
            max_length: 60
            notes: Possível FK para entidade Administrador/Usuário
          - field: EmpresaAdministradorNome
            dotnet_type: string
            max_length: 60
            notes: Extended attribute — considerar remover e buscar via join/FK
          - field: EmpresaEmail
            dotnet_type: string
            max_length: 60
            validation: EmailAddress
          - field: EmpresaAtivo
            dotnet_type: bool
            notes: Campo legado string — converter para bool
          - field: EmpresaFoto
            dotnet_type: string
            max_length: 60
            notes: Considerar armazenamento em blob storage (Azure Blob / S3)
          - field: EmpresaTipoRelatorio
            dotnet_type: string
            max_length: 60
            notes: Candidato a enum — domínio a definir
          - field: EmpresaDominio
            dotnet_type: string
            max_length: 60
            notes: Considerar validação de formato de domínio web
          - field: EmpresaFundoLogin
            dotnet_type: string
            max_length: 60
            notes: Considerar armazenamento em blob storage

      - name: EmpresaRepository
        type: Repository
        language: CSharp
        interface: IEmpresaRepository
        base: IRepository<EmpresaEntity, string>
        notes: >
          Implementar com Entity Framework Core.
          Incluir métodos: GetByIdAsync, GetAllAsync, GetAtivasAsync, GetByCNPJAsync.
          Estratégia REBUILD de banco — não reutilizar schema GeneXus; gerar migrations EF Core do zero.

      - name: EmpresaService
        type: Service
        language: CSharp
        interface: IEmpresaService
        notes: >
          Encapsular regras de negócio: validação de CNPJ único, ativação/desativação de empresa.
          Usar padrão @Transactional equivalente via TransactionScope ou DbContext.SaveChangesAsync.
          Traduzir regras GeneXus (Error/msg) para exceções de domínio ou ValidationException.
          Implementar auditoria de CreatedAt / UpdatedAt via interceptors do EF Core.

      - name: EmpresaController
        type: Controller
        language: CSharp
        route: /api/empresa
        notes: >
          Expor endpoints REST: GET /api/empresa, GET /api/empresa/{id}, POST /api/empresa,
          PUT /api/empresa/{id}, DELETE /api/empresa/{id}.
          Usar padrão Problem Details (RFC 7807) para erros.
          Aplicar [Authorize] conforme nível de segurança a definir com o time.

      - name: EmpresaDto
        type: DTO
        language: CSharp
        variants:
          - EmpresaRequestDto
          - EmpresaResponseDto
          - EmpresaListItemDto
        notes: Separar contratos de entrada e saída. Usar FluentValidation para validações de request.

      - name: EmpresaReactModule
        type: UIModule
        language: TypeScript
        framework: React
        strategy: PRESERVE_WITH_ADJUSTMENTS
        ui_source: AppMasterPage
        notes: >
          Inventário de UI retornou AppMasterPage sem tabs detectadas — estrutura de telas a ser
          reconstruída com base no fluxo funcional da entidade Empresa.
          Componentes shadcn/ui recomendados: DataTable, Form, Input, Select, Badge (ativo/inativo),
          Dialog (confirmação de exclusão).
          Temas: dark-devstudio conforme estratégia PRESERVE_WITH_ADJUSTMENTS.
          Implementar páginas: EmpresaListPage, EmpresaFormPage (create/edit), EmpresaDetailPage.
          Integrar via React Query (TanStack Query) para chamadas à API REST.

migration_database:
  strategy: REBUILD
  orm: EntityFrameworkCore
  dbms_target: A_DEFINIR
  notes: >
    Estratégia REBUILD selecionada — nenhuma tabela ou schema GeneXus será reaproveitado.
    Gerar migrations EF Core do zero com base nas entidades .NET Core definidas.
    Definir DBMS alvo (SQL Server, PostgreSQL ou outro) com o time de infraestrutura antes de iniciar migrations.
    Nomear tabelas em PascalCase preservando convenção GeneXus (ex.: Empresa → tabela Empresa).
    Incluir índices para: EmpresaCNPJ (único), EmpresaAdministradorId (FK se entidade existir).

migration_patterns:
  auth:
    source: GeneXus GAM (não inventariado explicitamente)
    target: ASP.NET Core Identity + JWT
    notes: >
      Confirmar se GeneXus GAM está presente no inventário completo antes de mapear roles/permissions.
  validation:
    source: Rules Error/msg GeneXus
    target: FluentValidation + ProblemDetails (RFC 7807)
  error_handling:
    target: GlobalExceptionMiddleware + IExceptionHandler (.NET 8)
  audit:
    fields: [CreatedAt, UpdatedAt, CreatedBy, UpdatedBy]
    implementation: EF Core SaveChangesInterceptor
  transactions:
    source: commit()/rollback() GeneXus
    target: DbContext.SaveChangesAsync com TransactionScope onde necessário
  logging:
    target: Serilog + SLF4J equivalente via ILogger<T>

warnings:
  - "Todos os campos do inventário de Empresa têm resolved_from: fallback:not-found — os tipos GeneXus reais não foram resolvidos. Revisar o inventário original antes de iniciar implementação para confirmar tipos (Numeric, VarChar, Boolean, Image etc.)."
  - "EmpresaId: tipo declarado como String (length 60) mas em GeneXus PKs numéricas são comuns. Confirmar se é Autonumber Numeric ou identificador externo (CNPJ, código de integração) antes de mapear para o banco."
  - "EmpresaAtivo declarado como String — confirmar se é booleano (Sim/Não) ou enumeração (ex.: A/I) no sistema legado. Impacta regras de negócio e filtros de listagem."
  - "EmpresaAdministradorId e EmpresaAdministradorNome sugerem FK para entidade de Usuário/Administrador não presente no inventário entregue. Verificar se essa entidade existe no sistema legado e incluí-la no escopo de migração."
  - "EmpresaTipoRelatorio aparenta ser um domínio enumerado GeneXus. Levantar os valores válidos no sistema legado e criar enum .NET correspondente antes de implementar o controller."
  - "EmpresaFoto e EmpresaFundoLogin sugerem armazenamento de imagens. Definir estratégia de blob storage (Azure Blob Storage, AWS S3 ou sistema de arquivos local) antes de implementar upload/download."
  - "AppMasterPage retornou tabs vazias no inventário de UI — estrutura de navegação do frontend não foi capturada automaticamente. Realizar análise manual do MasterPage GeneXus para reconstruir o layout de navegação no React."
  - "Estratégia REBUILD de banco selecionada: nenhum dado legado será migrado automaticamente. Planejar script de migração de dados (ETL) se houver dados em produção a preservar."
  - "DBMS alvo não definido no wizard. Confirmar com time de infraestrutura (SQL Server, PostgreSQL etc.) antes de configurar provider do EF Core e gerar migrations."
  - "Inventário recebido contém apenas a entidade Empresa. Se o sistema GLPPortal possuir mais entidades (Usuário, Administrador, Relatório etc.), reenviar inventário completo para geração do migration-plan abrangente."