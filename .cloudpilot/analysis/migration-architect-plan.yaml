cross_cutting:
  - name: Authentication
    strategy: JWT_STATELESS
    notes: GeneXus GAM stateful session translated to JWT Bearer token + refresh token; implement via ASP.NET Core JWT middleware
    ui_sources: [Login, GAMHome, GAMExampleChangePassword, GAMExampleRecoverPasswordStep1, GAMExampleRecoverPasswordStep2, GAMExampleRegisterUser, GAMExampleUpdateRegisterUser, GAMExampleNotAuthorized, GAMRemoteLogin, GAMChangeYourPassword, GAMSetPassword, WPEsqueciSenha, WPNovaConta, WPPrimeiroAcesso, WPEsqueciSenhaCliente, AcessoCliente, FinanceiroAcessoCliente]
  - name: Authorization
    strategy: RBAC_ROLES_CLAIMS
    notes: GeneXus GAM roles/permissions translated to ASP.NET Core claims-based authorization; Modulo/Perfil/Rotina structure maps to permission claims
    ui_sources: [GAMWWRoles, GAMRoleEntry, GAMWWUsers, GAMUserEntry, GAMWWAppPermissions, GAMAppPermissionEntry, NotAuthorized]
  - name: ErrorHandling
    strategy: RFC7807_PROBLEM_DETAILS
    notes: GeneXus msg() errors translated to RFC 7807 ProblemDetails; global exception handler via ASP.NET Core middleware; React toast/alert components for UX feedback
  - name: Pagination
    strategy: OFFSET_KEYSET
    notes: All GeneXus WorkWith list grids must implement server-side pagination via ASP.NET Core Pageable pattern; React table components with page/size controls
  - name: Audit
    strategy: ENTITY_LISTENERS
    notes: Fields like UsuarioId/UsuarioNome on creation/modification to be tracked via EF Core interceptors or IEntityTypeConfiguration; CreatedAt/UpdatedAt columns added to all entities
  - name: FileStorage
    strategy: BLOB_STORAGE
    notes: GeneXus image/blob attributes (e.g. EmpresaFoto, UsuarioFoto, ClienteAnexoPDF, GestaoServicoAnexoFoto) must be migrated to a configurable blob storage provider (Azure Blob / S3); return signed URLs
  - name: Notifications
    strategy: SIGNALR_PUSH
    notes: GestaoServico real-time updates, ProgramacaoRota status changes and Notificacao entities may benefit from SignalR hubs instead of polling
  - name: I18n
    strategy: DOTNET_RESX_I18NEXT
    notes: All Portuguese labels from GeneXus UI must be extracted to .resx files on backend and i18next JSON on React frontend; no hard-coded strings in components
  - name: Logging
    strategy: SERILOG_STRUCTURED
    notes: GeneXus log.msg() calls translated to Serilog structured logging with appropriate severity levels; LogRecord entity becomes a DB sink for audit log retention
  - name: Maps
    strategy: LEAFLET_OR_GOOGLE
    notes: MapWebComponent and geolocation features (ClienteLogistica latitude/longitude, PromptGeolocation) must be implemented via Leaflet or Google Maps React component

db_rebuild:
  strategy: CODE_FIRST_EF_CORE
  dbms_target: SQL_SERVER
  notes: >
    All GeneXus Transactions are rebuilt as EF Core Code-First entities with proper
    primary keys, foreign keys, indexes and navigation properties. Protheus tables
    (SA1010, SB1010, SE1010, SF4010, etc.) are treated as read-only external data sources
    accessed via integration services or read-only DbContext with views — no schema ownership.
    GeneXus autonumber PKs become identity columns or GUIDs depending on distributed context.
    Sub-level tables become separate EF Core entities with composite or surrogate PKs.

ui_rebuild:
  framework: REACT_18
  component_library: SHADCN_UI
  styling: TAILWIND_CSS_DARK_DEVSTUDIO
  routing: REACT_ROUTER_V6
  state: ZUSTAND_OR_REACT_QUERY
  notes: >
    PRESERVE_WITH_ADJUSTMENTS strategy: all existing GeneXus WorkWith screens (WW*),
    View screens (View*), General detail panels (General*) and prompt popups (Prompt*)
    are reproduced with equivalent React pages preserving the same navigation flows
    and field layout, upgraded with shadcn/ui components and Tailwind dark theme.
    Wizard flows (WizardClienteNova*, WizardProspect*, WizardGestaoAtivo*) are rebuilt
    as multi-step React form wizards. Dashboard pages (DashboardServico, DashboardContratos,
    DashboardRota, DashboardCliente, DashboardTecnicos, DashboardCompras, DashboardComissionamento,
    DashboardProgramacaoRota) are rebuilt with shadcn charts or Recharts.
    Chat UI (PanelChatWeb, ChatBotMasterWeb) rebuilt as React chat component with SignalR.
    GAM authentication UIs replaced by custom React auth pages backed by JWT endpoints.
    MasterPage and WorkWithPlusMasterPage translated to React layout components with sidebar navigation.

warnings:
  - "Protheus ERP tables (SA1010, SA2010, SA3010, SA4010, SB1010, SC7010, SD2010, SE1010, SE4010, SE5010, SF4010, SED010, CTT010, CT1010, DA0010, DA1010, CC2010, SAH010, SBE010, NNR010, SYA010) must NOT be owned by this application schema. Define integration read-only DbContexts or REST adapters pointing to the existing Protheus database."
  - "GeneXus GAM security model must be fully replaced. Existing GAM role/permission structure maps to ASP.NET Core claims. Migration team must audit all Modulo/Rotina/Perfil/PMRFuncao records and translate to claim definitions before go-live."
  - "Entities marked as BusinessComponent (e.g. UsuarioBC, EmpresaBC, GestaoServicoBC, ClienteBC, ClienteLogisticaBC) are duplicates of their Transaction counterparts. These must be consolidated into single EF Core entities; duplicate definitions must NOT generate separate database tables."
  - "OSAnexoTemp and ModuloRotinaTemp are temporary/session-scoped entities. Evaluate if these should become in-memory or Redis-backed structures instead of database tables after REBUILD strategy."
  - "ProgramacaoRotaCliente has an extremely wide field set (50+ fields) with denormalized data from Cliente and ClienteLogistica. During REBUILD, normalize appropriately and use navigation properties or projections at query time."
  - "GestaoServico and GestaoServicoBC have 50+ fields and strong overlap. Consolidate into one aggregate root. The sub-entities (Executante, Lista, Roteiro, Equipamento, Tipo, Anexo, ProgramacaoRota, OSRoteiroEquipamento, OSRoteiroProduto) must all be modeled as child entities with cascade rules."
  - "The Contrato entity has very deep sub-entity nesting (Responsavel, Faturamento, Anexo, Vendedor, Produto, Profissional, IndicePerformance, TipoServico). Ensure EF Core aggregate boundaries are correctly set to avoid N+1 query problems; use explicit Include strategies."
  - "Subscription.Invoicy.Payments 3-level nesting must be modeled as separate EF Core entities; EF Core does not support nested collection-of-collection lazy loading without explicit Includes."
  - "MercadoPago integration (MercadoPagoServices, MercadoPagoInfo, PurchaseOrder, Subscription, Plan, Payment, Cart) requires a dedicated payment integration layer. Webhook endpoints for MP notifications must be secured and idempotent."
  - "GXChatMessage.GXChatUserDevice suggests a device-based push notification model. If migrating to SignalR, the device tracking approach must be redesigned for web-socket connection management."
  - "AcessoCliente and FinanceiroAcessoCliente are customer-facing portal screens with separate authentication flow (WPPrimeiroAcesso, WPEsqueciSenhaCliente, WPBoletoCliente, WPCodigoPIX). This portal may require a separate React app or route namespace with isolated JWT audience."
  - "RetornoRotaSIVA contains raw integration return fields (cod_viagem, ide_nnf, qtd_manifesto, etc.) from SIVA logistics system. Map to a proper DTO/integration service; do not create a first-class domain entity for this."
  - "WPImportacao and WPImportarAbastecimento suggest file-based import flows. These must be rebuilt as async background jobs (e.g. ASP.NET Core BackgroundService or Hangfire) with progress feedback via SignalR or polling endpoint."
  - "All fallback:not-found java_type assignments in the semantic inventory indicate fields whose GeneXus types were not resolved. The migration team must audit each field against the original GeneXus Knowledge Base to assign correct .NET CLR types before generating EF Core entity properties."
  - "UI inventory shows 400+ WebPanels/WebComponents with empty tabs arrays — detailed layout information was not captured. PRESERVE_WITH_ADJUSTMENTS implementation must rely on functional testing against the live GeneXus system to verify field placement and business rules."
  - "DashboardTecnicos uses WPAgendaTecnica and WPAgendasMultiplas which depend on scheduler/calendar UX. Consider FullCalendar or React Big Calendar as the target component."
  - "PMRFuncaoTemp and ModuloRotinaTemp suggest temporary staging tables used during permission import. Evaluate if these are needed at runtime or only during data migration; if migration-only, implement as disposable migration scripts."
  - "ClienteLogistica.IBGE, ClienteNatureza, ClienteCodMunicipio suggest Brazilian fiscal/geographic data integration. Ensure IBGE municipality codes are seeded in the rebuilt database or sourced from an external reference API."