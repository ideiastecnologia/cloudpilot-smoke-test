system: glpportal-subset
target_stack: React + .NET Core
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD
modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        language: csharp
        description: Modelo de domínio mapeado para a tabela Empresa no banco reconstruído
        fields:
          - name: EmpresaId
            type: string
            max_length: 60
            nullable: false
            is_pk: true
          - name: EmpresaNome
            type: string
            max_length: 60
            nullable: false
          - name: EmpresaCNPJ
            type: string
            max_length: 60
            nullable: true
          - name: EmpresaContato
            type: string
            max_length: 60
            nullable: true
          - name: EmpresaEndereco
            type: string
            max_length: 60
            nullable: true
          - name: EmpresaAdministradorId
            type: string
            max_length: 60
            nullable: true
            notes: FK lógico para entidade de Administrador; validar se existe Transaction relacionada no inventário completo
          - name: EmpresaAdministradorNome
            type: string
            max_length: 60
            nullable: true
            notes: Atributo estendido (extended attribute) do GeneXus; replicar como campo desnormalizado ou resolver via JOIN em Service
          - name: EmpresaEmail
            type: string
            max_length: 60
            nullable: true
            notes: Mapear para tipo EmailAddress com validação de formato no Service
          - name: EmpresaAtivo
            type: string
            max_length: 60
            nullable: true
            notes: Tipo original não resolvido (fallback); provável boolean — confirmar e migrar para bool no modelo .NET
          - name: EmpresaFoto
            type: string
            max_length: 60
            nullable: true
            notes: Provável URL ou caminho de imagem; confirmar estratégia de armazenamento (blob, filesystem, CDN)
          - name: EmpresaTipoRelatorio
            type: string
            max_length: 60
            nullable: true
            notes: Possível domínio enumerado GeneXus; mapear para enum C# após levantamento dos valores permitidos
          - name: EmpresaDominio
            type: string
            max_length: 60
            nullable: true
          - name: EmpresaFundoLogin
            type: string
            max_length: 60
            nullable: true
            notes: Provável URL ou caminho de imagem de customização de tela de login
      - name: EmpresaRepository
        type: Repository
        language: csharp
        description: Interface IEmpresaRepository + implementação EmpresaRepository usando Entity Framework Core
        operations:
          - GetByIdAsync
          - GetAllAsync
          - AddAsync
          - UpdateAsync
          - DeleteAsync
        notes: Usar padrão Repository + Unit of Work; banco reconstruído via db_strategy REBUILD implica migrations EF Core do zero
      - name: EmpresaService
        type: Service
        language: csharp
        description: Camada de negócio; traduz regras GeneXus (Error/Default/NoAccept) para validações .NET
        responsibilities:
          - Validação de formato de EmpresaEmail
          - Verificação de unicidade de EmpresaCNPJ
          - Resolução de EmpresaAdministradorNome via repositório de Administrador (se existir)
          - Controle de EmpresaAtivo (ativação/desativação)
        patterns:
          - FluentValidation para regras declarativas equivalentes às GeneXus Rules
          - Transações gerenciadas via IUnitOfWork com rollback em exceções de negócio
      - name: EmpresaController
        type: Controller
        language: csharp
        description: REST Controller ASP.NET Core expondo endpoints CRUD para Empresa
        base_route: /api/empresas
        endpoints:
          - method: GET
            path: /api/empresas
            operation: ListAll
          - method: GET
            path: /api/empresas/{id}
            operation: GetById
          - method: POST
            path: /api/empresas
            operation: Create
          - method: PUT
            path: /api/empresas/{id}
            operation: Update
          - method: DELETE
            path: /api/empresas/{id}
            operation: Delete
        notes: Seguir padrão RFC 7807 Problem Details para respostas de erro; equivalente ao msg()/Error() GeneXus
      - name: EmpresaDto
        type: DTO
        language: csharp
        description: DTOs de request e response para desacoplar entidade de domínio da camada HTTP
        variants:
          - EmpresaRequestDto
          - EmpresaResponseDto
      - name: EmpresaReactPage
        type: UIComponent
        language: typescript_react
        description: Página React preservando fluxo e campos do WebPanel GeneXus com ajustes visuais (shadcn/ui)
        ui_strategy_notes: >
          PRESERVE_WITH_ADJUSTMENTS — manter mesma sequência de campos e comportamento de formulário
          do objeto GeneXus original; aplicar componentes shadcn/ui para inputs, botões e feedback;
          não redesenhar fluxo UX; adaptar EmpresaFoto e EmpresaFundoLogin para componentes de upload/preview
        components:
          - EmpresaForm
          - EmpresaList
          - EmpresaDetail
        state_management: React Query para cache e sincronização com API REST
        validation: react-hook-form + zod espelhando validações do EmpresaService

db:
  strategy: REBUILD
  engine_recommendation: SQL Server ou PostgreSQL (confirmar com time de infraestrutura)
  migration_tool: Entity Framework Core Migrations
  notes: >
    Banco será reconstruído do zero via EF Core; não há aproveitamento de schema legado GeneXus.
    Definir convenções de nomenclatura de tabelas e colunas no DbContext antes de gerar primeira migration.
    Revisar campos com tipo fallback:not-found antes de executar migration inicial.

cross_cutting:
  auth:
    pattern: JWT stateless + refresh token
    notes: Substituir gerenciamento de sessão stateful GeneXus por JWT; implementar middleware de autenticação ASP.NET Core
  error_handling:
    pattern: GlobalExceptionMiddleware + RFC 7807 ProblemDetails
    notes: Equivalente ao ControllerAdvice; capturar exceções de negócio lançadas pelo Service
  logging:
    pattern: SLF4J equivalente no .NET é Microsoft.Extensions.Logging + Serilog
    notes: Mapear msg()/log.msg() GeneXus para níveis Info/Warning/Error Serilog
  validation:
    pattern: FluentValidation
    notes: Traduzir regras GeneXus Error/Default/NoAccept para validators FluentValidation no Service
  i18n:
    pattern: i18next no frontend React
    notes: Textos hardcoded em português nos campos GeneXus devem ser externalizados para arquivos de tradução

warnings:
  - "Todos os campos têm resolved_from: fallback:not-found — os tipos GeneXus originais não foram resolvidos; é obrigatório revisar cada campo e confirmar tipo real (boolean, numeric, image, email, enum) antes de gerar migrations EF Core"
  - "EmpresaAdministradorId e EmpresaAdministradorNome sugerem FK para uma Transaction de Administrador/Usuário não presente no inventário fornecido; solicitar inventário completo para mapear relacionamento e evitar dados desnormalizados"
  - "EmpresaAtivo com tipo fallback string é provável boolean GeneXus; validar e migrar para bool para evitar lógica de conversão em runtime"
  - "EmpresaFoto e EmpresaFundoLogin são provavelmente blobs ou caminhos de arquivo; definir estratégia de armazenamento de mídia (Azure Blob, S3, disco local) antes de implementar upload no React e endpoint no Controller"
  - "EmpresaTipoRelatorio sugere domínio enumerado GeneXus; levantar todos os valores possíveis no sistema legado e criar enum C# correspondente para garantir type-safety"
  - "EmpresaCNPJ não possui validação de formato no inventário; implementar validação de CNPJ brasileiro no EmpresaService e no schema Zod do frontend"
  - "AppMasterPage do UI Inventory não possui tabs mapeadas; verificar se há lógica de layout ou navegação global no MasterPage GeneXus que precise ser reproduzida como layout shell React (header, sidebar, footer)"
  - "db_strategy REBUILD implica ausência de dados migrados por padrão; confirmar se há necessidade de script de carga inicial (seed) para dados de Empresa existentes no sistema legado"
  - "O inventário semântico fornecido cobre apenas a entidade Empresa; o plano de migração deve ser expandido conforme inventário completo do sistema glpportal for disponibilizado"