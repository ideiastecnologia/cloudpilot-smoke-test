system: glpportal-subset
target_stack: React + .NET Core
ui_strategy: PRESERVE_WITH_ADJUSTMENTS
db_strategy: REBUILD

modules:
  - name: Empresa
    source_entity: Empresa
    target_package: com.glpportal.empresa
    artifacts:
      - name: EmpresaEntity
        type: Entity
        target_file: Empresa.cs
        fields:
          - name: EmpresaId
            csharp_type: string
            max_length: 60
            is_primary_key: true
          - name: EmpresaNome
            csharp_type: string
            max_length: 60
          - name: EmpresaCNPJ
            csharp_type: string
            max_length: 60
          - name: EmpresaContato
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaEndereco
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaAdministradorId
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaAdministradorNome
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaEmail
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaAtivo
            csharp_type: bool
            notes: "campo legado String; reconstruir como bool no REBUILD"
          - name: EmpresaFoto
            csharp_type: string
            max_length: 255
            nullable: true
            notes: "armazenar URL ou caminho relativo; binário não persistido diretamente"
          - name: EmpresaTipoRelatorio
            csharp_type: string
            max_length: 60
            nullable: true
            notes: "candidato a enum após levantamento de valores possíveis"
          - name: EmpresaDominio
            csharp_type: string
            max_length: 60
            nullable: true
          - name: EmpresaFundoLogin
            csharp_type: string
            max_length: 255
            nullable: true
            notes: "armazenar URL ou caminho relativo"
        orm: EF Core
        table_name: Empresas
        annotations:
          - "[Table(\"Empresas\")]"
          - "[Key]"

      - name: EmpresaRepository
        type: Repository
        target_file: IEmpresaRepository.cs
        interface: IEmpresaRepository
        methods:
          - GetByIdAsync(string id)
          - GetAllAsync()
          - AddAsync(Empresa empresa)
          - UpdateAsync(Empresa empresa)
          - DeleteAsync(string id)
          - ExistsByIdAsync(string id)
        implementation_file: EmpresaRepository.cs
        base_class: EfRepository<Empresa>

      - name: EmpresaService
        type: Service
        target_file: EmpresaService.cs
        interface: IEmpresaService
        methods:
          - GetEmpresaByIdAsync(string id)
          - ListEmpresasAsync()
          - CreateEmpresaAsync(EmpresaCreateDto dto)
          - UpdateEmpresaAsync(string id, EmpresaUpdateDto dto)
          - DeleteEmpresaAsync(string id)
        notes:
          - "Validação de CNPJ deve ser implementada nesta camada"
          - "Regra de unicidade de CNPJ aplicada via validação de serviço"
          - "Campos EmpresaFoto e EmpresaFundoLogin devem usar serviço de storage separado"

      - name: EmpresaController
        type: Controller
        target_file: EmpresaController.cs
        base_route: /api/empresas
        endpoints:
          - method: GET
            route: /
            action: ListEmpresas
            response: EmpresaDto[]
          - method: GET
            route: /{id}
            action: GetEmpresa
            response: EmpresaDto
          - method: POST
            route: /
            action: CreateEmpresa
            request_body: EmpresaCreateDto
            response: EmpresaDto
          - method: PUT
            route: /{id}
            action: UpdateEmpresa
            request_body: EmpresaUpdateDto
            response: EmpresaDto
          - method: DELETE
            route: /{id}
            action: DeleteEmpresa
            response: "204 NoContent"
        auth: Bearer JWT

      - name: EmpresaDtos
        type: DTO
        target_file: EmpresaDtos.cs
        records:
          - EmpresaDto
          - EmpresaCreateDto
          - EmpresaUpdateDto

      - name: EmpresaProfile
        type: AutoMapperProfile
        target_file: EmpresaProfile.cs
        mappings:
          - "Empresa → EmpresaDto"
          - "EmpresaCreateDto → Empresa"
          - "EmpresaUpdateDto → Empresa"

  - name: UI
    source_entity: AppMasterPage
    target_package: glpportal.ui
    ui_framework: React
    ui_strategy_detail: >
      PRESERVE_WITH_ADJUSTMENTS — manter fluxos e estrutura de navegação do MasterPage
      legado; substituir componentes visuais por shadcn/ui com dark-devstudio theme.
      Nenhuma aba (tab) identificada no inventário; estrutura de layout a ser
      levantada durante análise do AppMasterPage GeneXus original.
    artifacts:
      - name: AppLayout
        type: ReactComponent
        target_file: src/layouts/AppLayout.tsx
        notes: "Substituição do AppMasterPage; incluir header, sidebar e footer conforme layout legado"
      - name: EmpresaListPage
        type: ReactPage
        target_file: src/pages/empresa/EmpresaList.tsx
        api_endpoint: GET /api/empresas
      - name: EmpresaFormPage
        type: ReactPage
        target_file: src/pages/empresa/EmpresaForm.tsx
        api_endpoints:
          - POST /api/empresas
          - PUT /api/empresas/{id}
          - GET /api/empresas/{id}
      - name: EmpresaDetailPage
        type: ReactPage
        target_file: src/pages/empresa/EmpresaDetail.tsx
        api_endpoint: GET /api/empresas/{id}

infrastructure:
  database:
    strategy: REBUILD
    engine: "A definir conforme ambiente — SQL Server ou PostgreSQL recomendados"
    migration_tool: EF Core Migrations
    seed_data: false
    notes:
      - "Todos os campos legados eram String(60); tipagem foi inferida por nome semântico"
      - "Revisar tamanhos de campo com DBA antes de gerar migration inicial"
  auth:
    pattern: JWT Bearer Token
    notes: "Endpoints protegidos por padrão; definir roles conforme regras de negócio do GLPPortal"

warnings:
  - "EmpresaId é String(60) no legado — confirmar se é UUID, código alfanumérico ou sequencial antes de definir tipo definitivo no EF Core"
  - "EmpresaAtivo está mapeado como String no inventário legado; reconstruído como bool — validar com equipe de negócio se existem valores além de true/false (ex: 'P', 'S/N')"
  - "EmpresaTipoRelatorio é candidato a enum — levantar todos os valores possíveis no sistema legado antes de fixar tipo"
  - "EmpresaFoto e EmpresaFundoLogin armazenam caminhos/URLs de imagem — definir estratégia de storage (Azure Blob, S3 ou sistema de arquivos local) antes de implementar upload"
  - "EmpresaAdministradorId e EmpresaAdministradorNome sugerem relacionamento com entidade Administrador/Usuário — verificar se existe Transaction correspondente no inventário GeneXus não incluída neste subset"
  - "EmpresaCNPJ requer validação de formato e unicidade — implementar validador customizado na camada de Service"
  - "AppMasterPage não possui tabs identificadas no inventário de UI — realizar engenharia reversa do objeto GeneXus original para mapear regiões de layout antes de implementar AppLayout React"
  - "db_strategy REBUILD implica ausência de migração de dados legados; confirmar com stakeholders se dados existentes precisam ser migrados via ETL antes do go-live"
  - "Nenhum módulo além de Empresa foi identificado no inventário fornecido; o migration-plan deverá ser estendido ao receber inventário completo do sistema GLPPortal"