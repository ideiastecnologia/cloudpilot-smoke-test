cross_cutting:
  - name: Database
    strategy: REBUILD
    target_dbms: SQL Server
    orm: Entity Framework Core
    notes: >
      Criar novo schema relacional normalizado a partir do inventário de entidades.
      Entidades Protheus (CC2010, SA1010, etc.) NÃO devem fazer parte do novo schema — integrar via API.
      Aplicar migrations versionadas com EF Core Migrations.
      Campos de data/hora: padronizar para DateTimeOffset.
      Campos de imagem/foto/arquivo: armazenar referência (URL) no banco e binário em BlobStorage.

  - name: Frontend
    framework: React
    ui_library: shadcn/ui
    theme: dark-devstudio
    strategy: PRESERVE_WITH_ADJUSTMENTS
    notes: >
      Preservar fluxos de navegação existentes (Wizards, WorkWith, prompts) adaptando para componentes shadcn.
      Dashboards (DashboardServico, DashboardTecnicos, DashboardContratos, DashboardRota, DashboardCompras, DashboardComissionamento, DashboardCliente, DashboardProgramacaoRota) mapear para páginas React com bibliotecas de gráficos (Recharts ou Chart.js).
      MapWebComponent deve ser reimplementado com Leaflet.js ou Google Maps API.
      PanelChatWeb / ChatBotMasterWeb: implementar com WebSocket (SignalR) e componente React de chat.
      Telas de acesso de cliente (FinanceiroAcessoCliente, WPBoletoCliente, WPCodigoPIX) devem ter layout separado sem o menu principal.

  - name: Authentication
    strategy: JWT_STATELESS
    provider: ASP.NET Core Identity
    notes: >
      Substituir GAM por ASP.NET Core Identity com JWT + Refresh Token.
      Controle de acesso baseado em Perfil → Modulo → Rotina → Funcao deve ser implementado como políticas de autorização customizadas.
      Suporte a múltiplos perfis de acesso (administrador, usuário interno, cliente externo via portal).

  - name: FileStorage
    strategy: BLOB_STORAGE
    notes: >
      Campos de foto, imagem, anexo, PDF e arquivo presentes em múltiplas entidades devem ser migrados para BlobStorage (Azure Blob Storage ou AWS S3).
      Banco de dados armazena apenas URL ou identificador do objeto.
      Entidades afetadas: Empresa (Foto, FundoLogin), Parametro (Image), GestaoServicoAnexo, OrdemExecutanteAnexo, ClienteAnexo, ContratoAnexo, AbastecimentoAnexo, MedicaoAnexo, DocumentoAnexo, ProspectAnexo, GestaoAtivo (Foto), OSAnexoTemp.

  - name: Integrations
    notes: >
      SIVA (RetornoRotaSIVA, ProgramacaoRota.EnviadoSIVA): criar IntegrationService dedicado com retry policy (Polly).
      Protheus/TOTVS: criar IntegrationClient com DTOs para tabelas SA1010, SB1010, SE1010 etc.
      MercadoPago: implementar SDK oficial do MercadoPago para .NET para Subscription, PurchaseOrder e Payment.
      Email SMTP: usar MailKit ou SendGrid via interface IEmailService — não expor ParametroEmail diretamente.

warnings:
  - "DUPLICIDADE DE ENTIDADES: Empresa/EmpresaBC, Usuario/UsuarioBC, Cliente/ClienteBC, ClienteLogistica/ClienteLogisticaBC, GestaoServico/GestaoServicoBC são pares BC/Transaction do GeneXus — consolidar em uma única entidade por domínio no novo modelo relacional."
  - "ENTIDADES PROTHEUS: CC2010, SAH010, SBE010, DA0010, SE4010, NNR010, SYA010, SB1010, SA4010, SA1010, CT1010, CTT010, SF4010, SA3010, SED010, SE1010, DA1010, SC7010, SA2010, SD2010, SE5010 são tabelas internas do ERP TOTVS Protheus. NÃO recriar como tabelas locais — integrar via API REST do Protheus ou camada de integração dedicada."
  - "SECRETS E SEGURANÇA: Campos ParametroEmailSenha, MercadoPagoAccessToken, MercadoPagoClientSecret, UserPassword, UsuarioSenha, ClienteSenha, ClienteCodigoAcesso JAMAIS devem ser armazenados em texto plano. Implementar criptografia em repouso e uso de secrets vault."
  - "CAMPOS SNAKE_CASE em RetornoRotaSIVA (retornoid, cod_viagem, dat_chegada_cliente etc.): indicam payload de integração externa — manter como DTO de integração, não como entidade de domínio."
  - "ENTIDADES TEMPORÁRIAS: OSAnexoTemp, ModuloRotinaTemp, PMRFuncaoTemp devem ser avaliadas para eliminação — substituir por operações transacionais adequadas ou armazenamento temporário em Redis/BlobStorage."
  - "CHAT EM TEMPO REAL: GXChatMessage/GXChatUser requerem WebSocket (SignalR no .NET Core) — não é suportado por REST puro."
  - "MÁQUINA DE ESTADOS em GestaoServico: campos GestaoServicoStatus, OSAprovacaoDtHora, ServicoUsuarioCancelamentoId, GestaoServicoDtHoraCancelamento indicam fluxo de estados complexo — modelar explicitamente como state machine com enum de estados e histórico de transições."
  - "CAMPOS MENSAIS (MetaMesJan..Dez, OrcamentoMensalJan..Dez): considerar normalização em tabela de valores mensais (ano, mes, valor) em vez de 12 colunas fixas."
  - "AUTENTICAÇÃO DUAL: sistema possui dois contextos de autenticação distintos — portal interno (GAM/Usuario) e portal do cliente (AcessoCliente/ClienteSenha/ClienteCodigoAcesso). Definir estratégia unificada de autenticação com JWT e claims diferenciados por perfil."
  - "INTEGRAÇÃO SIVA: campo ProgramacaoRota.EnviadoSIVA e entidade RetornoRotaSIVA indicam integração bidirecional com sistema externo SIVA — mapear contratos de API antes de iniciar migração deste módulo."
  - "UI SEM TABS: todas as entradas de UI_Inventory possuem tabs vazia — o inventário de abas não foi capturado pelo scanner. Realizar revisão manual das telas WorkWith e View para mapear estrutura de abas antes de implementar as páginas React."
  - "PORTAL E-COMMERCE (User, Plan, Subscription, PurchaseOrder, Payment, Cart, Item, MercadoPago): contexto separado de e-commerce com integração MercadoPago — definir se será mantido no mesmo backend ou extraído como microserviço/BFF dedicado."
  - "CAMPOS DE GEOLOCALIZAÇÃO: ClienteLogistica (Latitude, Longitude), ProgramacaoRotaCliente (endereços), MapWebComponent — definir provider de mapas (Google Maps, Leaflet, Azure Maps) e estratégia de geocodificação antes da implementação."
  - "NÚMERO ELEVADO DE ENTIDADES: o sistema possui mais de 120 entidades distintas. Recomenda-se priorização por domínio funcional e entrega incremental: (1) Autenticação/Perfil, (2) Cliente/Empresa, (3) GestaoServico/OS, (4) Faturamento/Contrato, (5) Rota/Logística, (6) Integrações."